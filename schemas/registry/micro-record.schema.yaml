# ExpertPack Micro-Record Schema
# Version: 1.0.0 (2026-04-15)
#
# A micro-record is the canonical machine-readable representation of
# a single ExpertPack content file. Generated by ep-micro-record-export
# or authored manually for high-value entries.
#
# Required fields are marked (required). All others are recommended or optional.

schema_version: "1.0.0"

fields:

  # -----------------------------------------------------------------------
  # Identity
  # -----------------------------------------------------------------------

  id:
    required: true
    type: string
    format: "pack-slug/relative/path-without-extension"
    example: "ezt-designer/concepts/con-scheduling-algorithm"
    description: >
      Stable, globally unique identifier for this knowledge record.
      Matches the frontmatter `id` field of the source file.
      Never changes once assigned. Used for deterministic lookups and
      cross-pack linking.

  source_span_uri:
    required: true
    type: string
    format: "pack-slug/relative/path.md"
    example: "ezt-designer/concepts/con-scheduling-algorithm.md"
    description: >
      Relative path to the source file within the pack.
      Enables claim-to-span traceability: a verifier can open this
      file and confirm the canonical_statement is supported.

  # -----------------------------------------------------------------------
  # Canonical content
  # -----------------------------------------------------------------------

  label:
    required: true
    type: string
    maxLength: 120
    example: "Scheduling Algorithm"
    description: >
      Short human-readable label for this record. Matches the file's
      H1 title or frontmatter `title`. Used as the display name in
      graph visualizations and search result summaries.

  canonical_statement:
    required: true
    type: string
    maxLength: 400
    example: >
      EasyTerritory Designer uses a spatial scheduling algorithm that
      assigns territory records to reps by optimizing for workload
      balance and geographic contiguity simultaneously.
    description: >
      The single most important assertable claim from this file.
      One sentence. Should be self-contained — readable without the
      source file. This is what gets stored in the triple store and
      returned for factual lookups.

  # -----------------------------------------------------------------------
  # Classification
  # -----------------------------------------------------------------------

  type:
    required: true
    type: string
    enum_ref: "types.yaml"
    example: "concept"
    description: >
      Content type. Must match a declared type in types.yaml.
      Determines how the record is indexed and retrieved.

  pack:
    required: true
    type: string
    example: "ezt-designer"
    description: >
      Slug of the pack this record belongs to. Matches the pack's
      manifest.yaml `slug` field.

  tags:
    required: false
    type: array
    items: string
    example: ["algorithm", "scheduling", "partitioning"]
    description: >
      Semantic tags from the source file's frontmatter `tags` field.
      Used for faceted filtering in search and graph queries.

  # -----------------------------------------------------------------------
  # Provenance
  # -----------------------------------------------------------------------

  provenance:
    required: false
    type: object
    description: >
      Tracks when and how this knowledge was established and verified.
    fields:

      recorded_at:
        required: false
        type: string
        format: "YYYY-MM-DD"
        description: >
          When this record was first added to the pack (ingestion date).
          Equivalent to the file creation date. Never updated after initial
          creation.

      valid_from:
        required: false
        type: string
        format: "YYYY-MM-DD"
        description: >
          When the described knowledge became true in the world.
          For product features: when the feature shipped.
          For concepts: when the approach was adopted.
          May predate `recorded_at` if content was backfilled.
          Enables historical queries ("what was true as of Q3 2025?").

      verified_at:
        required: false
        type: string
        format: "YYYY-MM-DD"
        description: >
          When the canonical_statement was last confirmed accurate.
          Matches the source file's frontmatter `verified_at`.

      verified_by:
        required: false
        type: string
        description: >
          Who or what verified the content (human name, agent ID, or
          "auto" for hash-verified unchanged content).

      source:
        required: false
        type: string
        description: >
          Where the knowledge came from (URL, document name, person).
          Free-form. Matches the source file's frontmatter `source`.

      content_hash:
        required: false
        type: string
        format: "sha256:hex"
        description: >
          SHA-256 of the source file body. Enables drift detection:
          if the source file changes, the hash no longer matches
          and the record should be re-exported.

  # -----------------------------------------------------------------------
  # Graph relations
  # -----------------------------------------------------------------------

  related:
    required: false
    type: array
    items:
      type: object
      fields:
        id:
          type: string
          description: "Target record id"
        kind:
          type: string
          enum_ref: "edge-kinds.yaml"
          description: "Edge kind (wikilink, related, context, supersedes)"
    description: >
      Direct relations to other micro-records. Derived from the source
      file's wikilinks and `related:` frontmatter. Matches the edges
      in `_graph.yaml` for this node.

  # -----------------------------------------------------------------------
  # Temporal lifecycle (bi-temporal extension)
  # -----------------------------------------------------------------------

  lifecycle:
    required: false
    type: object
    description: >
      Tracks the knowledge lifecycle — useful for versioned packs and
      automated fact invalidation. Optional; omit for stable content.
    fields:

      status:
        type: string
        enum: ["active", "superseded", "deprecated", "draft"]
        default: "active"
        description: >
          Current status of this record.
          - active: current and authoritative
          - superseded: replaced by a newer record (see superseded_by)
          - deprecated: no longer valid, not replaced
          - draft: not yet verified

      superseded_by:
        type: string
        description: >
          ID of the record that supersedes this one (when status=superseded).
          Enables automated fact invalidation: when a new record is added
          with status=active, the old record is marked superseded_by=<new_id>.

      valid_until:
        type: string
        format: "YYYY-MM-DD"
        description: >
          Date when this record becomes invalid (optional hard expiry).
          Matches the source file's `expires_at` volatile field if set.
